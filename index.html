<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="container-letter">
      <div class="cover"></div>
      <span class="heart">♥</span>
      <p class="paper" id="mainMessage">
        Hoy celebramos un año en el que cada día a tu lado ha sido un regalo, una aventura que no cambiaría por nada. Aunque el tiempo pase, mi cariño por ti solo crece, y sé que este es solo el comienzo de una historia que quiero vivir contigo por siempre. Feliz primer aniversario, amor! 
      </p>
      <div class="letter"></div>
    </div>
    <div class="options">
      <button id="open">Abrir</button>
      <button id="close">Cerrar</butto>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
